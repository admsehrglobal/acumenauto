{% extends "base.html" %}

{% block title %}Login | Acumen Auto{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white p-6 rounded-lg shadow border border-slate-200">
  <h1 class="text-xl font-semibold mb-4 text-slate-900">Sign in</h1>

  {% if form.errors %}
    <div class="mb-4 p-3 rounded bg-red-50 border border-red-200 text-red-800 text-sm">
      Wrong username or password.
    </div>
  {% endif %}

  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1" for="id_username">Username</label>
      <input type="text" name="username" id="id_username" autocomplete="username" autofocus required
             class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-sky-400">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1" for="id_password">Password</label>
      <input type="password" name="password" id="id_password" autocomplete="current-password" required
             class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-sky-400">
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit"
            class="w-full bg-slate-900 text-white py-2 rounded hover:bg-slate-700 transition">
      Sign in
    </button>
  </form>
</div>
{% endblock %}
