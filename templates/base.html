{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Acumen Auto{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  {% if user.is_authenticated %}
  <nav class="bg-slate-900 text-white">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="{% url 'dashboard' %}" class="font-semibold tracking-wide">Acumen Auto</a>
      <div class="flex items-center gap-4 text-sm">
        <a href="{% url 'dashboard' %}" class="hover:text-sky-300">Runs</a>
        <a href="{% url 'settings' %}" class="hover:text-sky-300">Settings</a>

        <div class="relative" id="user-menu">
          <button type="button" id="user-menu-btn"
                  class="flex items-center gap-1 text-slate-300 hover:text-white focus:outline-none">
            <span>{{ user.username }}</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          <div id="user-menu-dropdown"
               class="hidden absolute right-0 mt-2 w-48 bg-white text-slate-800 rounded shadow-lg border border-slate-200 z-10">
            <a href="{% url 'password_change' %}"
               class="block px-4 py-2 text-sm hover:bg-slate-100">Change password</a>
            <form method="post" action="{% url 'logout' %}" class="block">
              {% csrf_token %}
              <button type="submit"
                      class="w-full text-left px-4 py-2 text-sm hover:bg-slate-100 border-t border-slate-100">
                Logout
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </nav>
  <script>
    (function() {
      const btn = document.getElementById("user-menu-btn");
      const dd = document.getElementById("user-menu-dropdown");
      if (!btn || !dd) return;
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        dd.classList.toggle("hidden");
      });
      document.addEventListener("click", (e) => {
        if (!dd.classList.contains("hidden") && !dd.contains(e.target)) {
          dd.classList.add("hidden");
        }
      });
    })();
  </script>
  {% endif %}

  <main class="max-w-5xl mx-auto px-4 py-6">
    {% if messages %}
      <div class="mb-4 space-y-2">
        {% for m in messages %}
          <div class="px-4 py-2 rounded border
                      {% if m.tags == 'success' %}bg-green-50 border-green-200 text-green-800
                      {% elif m.tags == 'error' %}bg-red-50 border-red-200 text-red-800
                      {% else %}bg-slate-50 border-slate-200 text-slate-800{% endif %}">
            {{ m }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
